<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Кулинарная книга</title>
    <link rel="stylesheet" href="/webapp/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="app-header">
        <button id="back-button" class="icon-button hidden" aria-label="Назад">←</button>
        <h1 id="screen-title">🍳 Кулинарная книга</h1>
      </header>

      <section id="search-wrap" class="search-wrap hidden">
        <input id="search-input" type="search" placeholder="Поиск рецептов..." />
      </section>

      <section id="categories-screen">
        <div id="categories-grid" class="categories-grid"></div>
      </section>

      <section id="recipes-screen" class="hidden">
        <div id="recipes-list" class="recipes-list"></div>
      </section>
    </main>

    <script src="/webapp/app.js"></script>
  </body>
</html>
