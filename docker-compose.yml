services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recipe-parser-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - recipe_data:/app/data/local_recipes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recipe-parser-bot
    command: python run.py
    env_file:
      - .env
    volumes:
      - recipe_data:/app/data/local_recipes
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

volumes:
  recipe_data:
