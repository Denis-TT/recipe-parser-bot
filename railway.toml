[build]
builder = "NIXPACKS"
nixpacksVersion = "1.29.0"

[build.config]
pythonVersion = "3.11"

[deploy]
preDeployCommand = "bash scripts/railway_predeploy.sh"
startCommand = "python run.py"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1
numReplicas = 1
[deploy]
startCommand = "pkill -9 -f python 2>/dev/null; sleep 2; python run.py"
