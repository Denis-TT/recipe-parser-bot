[build]
builder = "NIXPACKS"
nixpacksVersion = "1.29.0"

[build.config]
pythonVersion = "3.11"

[deploy]
numReplicas = 1
startCommand = "sh -c 'uvicorn api:app --host 0.0.0.0 --port ${PORT:-8080} & python run.py'"
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyMaxRetries = 5
