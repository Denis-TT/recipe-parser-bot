[build]
builder = "NIXPACKS"
nixpacksVersion = "1.29.0"

[build.config]
pythonVersion = "3.11"

[deploy]
numReplicas = 1
startCommand = "pkill -9 -f 'python.*run.py' 2>/dev/null; pkill -9 -f 'uvicorn api:app' 2>/dev/null; sleep 2; uvicorn api:app --host 0.0.0.0 --port ${PORT:-8080} & python run.py"
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyMaxRetries = 5
